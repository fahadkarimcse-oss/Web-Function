<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>
    <link rel="stylesheet" href="style.css">

    <script>
        // Array of colors to cycle through
        const colors = ["lightblue", "red", "green", "orange", "pink"];
        let colorIndex = 0;

        // Function to change the background color (cycles through colors)
        function changeBackground() {
            colorIndex = (colorIndex + 1) % colors.length; // Move to next color first
            document.body.style.backgroundColor = colors[colorIndex];
        }

        // Function to show an alert message
        function showAlert() {
            alert("Welcome to JavaScript!");
        }

        // Function to toggle (show/hide) the paragraph
        function hideParagraph() {
            const para = document.getElementById("intro");
            if (para.style.display === "none") {
                para.style.display = "block";
            } else {
                para.style.display = "none";
            }
        }

    </script>

</head>

<body>

    <button type="button" onclick="changeBackground()">Change Background Color</button>
    <button type="button" onclick="showAlert()">Show Message</button>
    <button type="button" onclick="hideParagraph()">Show/Hide Paragraph</button>

    <br>

    <h1>
        My First Web Page
    </h1>

    <p id="intro">
        Hello! This is Fahad Karim. I am a student from CSE department.<br>
        I aim to be a good web developer.<br>
        My other aim is to be a computer science and engineer.<br>
        I would like to appreciate myself for web development.<br>
        
    </p>

    <br>

    <img src="./Fahad.jpg" alt="Boy in a punjabi">




    <!--
    (1) What is JavaScript used for?
    JavaScript is used for making web pages interactive, which allows developers to add dynamic behavior
    such as responding to user actions, modifying page content, validating forms, and controlling
    multimedia elements.

    (2) What does onclick do?
    Onclick runs a specified JavaScript function when a click is made.
    It triggers an event when a user clicks on an HTML element like a button.
    -->

</body>
</html>
